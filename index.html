<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>낚시 게임</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0b1d33;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: 'Segoe UI', sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game-container {
        position: relative;
        width: 100%;
        max-width: 844px;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }

      #fullscreen-toggle {
        position: absolute;
        top: 44px;
        right: 8px;
        z-index: 20;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.45);
        color: #ffffff;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #fullscreen-toggle:hover {
        background: rgba(0, 0, 0, 0.6);
      }

      #fullscreen-toggle:focus-visible {
        outline: 2px solid #74c0fc;
        outline-offset: 2px;
      }

      body.is-fullscreen {
        align-items: stretch;
      }

      body.is-fullscreen #game-container {
        max-width: none;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        aspect-ratio: auto;
        border-radius: 0;
        box-shadow: none;
      }

      @media (max-width: 900px), (max-height: 480px) {
        body {
          align-items: stretch;
        }

        #game-container {
          max-width: none;
          width: 100vw;
          height: 100dvh;
          aspect-ratio: auto;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <button id="fullscreen-toggle" type="button" aria-label="전체 화면" title="전체 화면" aria-pressed="false">⛶</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
